name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Create Release Asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare Plugin Zip
        run: |
          mkdir -p build/acromidia-manager
          cp -r * build/acromidia-manager/ || true
          rm -rf build/acromidia-manager/build
          rm -rf build/acromidia-manager/.git
          rm -rf build/acromidia-manager/.github
          cd build
          zip -r ../acromidia-manager.zip acromidia-manager
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: acromidia-manager.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
